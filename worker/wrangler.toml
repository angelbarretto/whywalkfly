name = "whywalkfly-stripe-webhook"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Secrets (set via `wrangler secret put NAME` — do NOT commit values):
#   STRIPE_WEBHOOK_SECRET   — from Stripe Dashboard → Developers → Webhooks → signing secret
#   RESEND_API_KEY          — from resend.com/api-keys
#   PDF_DOWNLOAD_URL        — Google Drive / Dropbox public link to the book PDF
#   FROM_EMAIL              — sender address, e.g. "Jo Barretto <jo@whywalkfly.com>"

[vars]
# Non-secret config goes here.
BOOK_TITLE = "Why Walk? Fly!"
